[notion]
default_workspace = "personal"
notion_home = ".notion-home"

[workspaces.personal]

[pages.sci_pop]
id = "project-page-id-here"

[datasources.items]
id = "data-source-id-here"
title_property = "Name"

[datasources.items.properties]
title = "Name"
link = "Link"
length = "Time"
status = "Status"
tags = "Tags"
date = "Date"
type = "Type"
score = "Score /5"
author = "Author"
project = "Project"
number = "Num"

[bundles.default_item]
properties = ["title", "link", "length"]

[bundles.youtube_item]
properties = ["title", "link", "length"]

[presets.add_item]
kind = "page_create"
datasource = "items"
bundle = "default_item"

[presets.add_youtube]
kind = "page_create"
datasource = "items"
bundle = "youtube_item"
youtube = true

[youtube]
provider = "no_key"
timeout_seconds = 10

[notion]
default_workspace = "personal"
notion_home = ".notion-home"

[workspaces.personal]
workspace_id = "workspace-id-here"

[pages.sci_pop]
id = "project-page-id-here"

[datasources.items]
id = "datasource-id-here"
title_property = "Name"

[datasources.items.properties]
title = "Name"
link = "Link"
length = "Time"

[bundles.default_item]
properties = ["title", "link", "length"]

[presets.add_youtube]
kind = "page_create"
datasource = "items"
bundle = "default_item"
youtube = true

[youtube]
provider = "no_key"
timeout_seconds = 10

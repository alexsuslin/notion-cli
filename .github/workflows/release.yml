name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e .[dev] build

      - name: Run tests
        run: pytest -q

      - name: Run Ruff
        run: ruff check .

      - name: Run Mypy
        run: mypy src

      - name: Build distributions
        run: python -m build

      - name: Extract release notes
        shell: python
        run: |
          from pathlib import Path

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          ref = "${{ github.ref_name }}"
          heading = f"## [{ref[1:]}]"
          collecting = False
          lines = []
          for line in changelog:
            if line.startswith("## [") and collecting:
              break
            if collecting:
              lines.append(line)
            if line.startswith(heading):
              collecting = True

          body = "\n".join(lines).strip()
          if not body:
            body = f"Release {ref}"
          Path("release-notes.md").write_text(body + "\n", encoding="utf-8")

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/*
